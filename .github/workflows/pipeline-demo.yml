name: Pipeline Demo

on:
  push:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Running tests (auto, like GitLab Prepare stage)"

  # ---------------- SDK module branch ----------------
  build-sdk-ios:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - run: echo "Build SDK iOS -> upload to AWS"

  build-sdk-android:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - run: echo "Build SDK Android -> upload to AWS"

  # ---------------- HTTP module branch ----------------
  build-http-mac:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - run: echo "Build HTTP macOS -> upload to AWS"

  build-http-win:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - run: echo "Build HTTP Windows -> upload to AWS"

  # ---------------- Products (manual "buttons" = approval gates) ----------------
  flutter-plugin:
    needs: [build-sdk-ios, build-sdk-android]
    runs-on: ubuntu-latest
    environment: btn-flutter-plugin
    steps:
      - run: echo "Assemble Flutter Plugin (SDK pulled from AWS)"

  sample-ios:
    needs: [build-sdk-ios]
    runs-on: ubuntu-latest
    environment: btn-sample-ios
    steps:
      - run: echo "Build iOS Sample (SDK pulled from AWS)"

  verify-mac:
    needs: [build-http-mac]
    runs-on: ubuntu-latest
    environment: btn-verify-mac
    steps:
      - run: echo "Build macOS Verify (HTTP pulled from AWS)"
