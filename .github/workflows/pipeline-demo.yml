name: Pipeline Demo

on:
  push:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps: [{ run: echo "tests" }]

  # ---- SDK targets (auto). Each is built ONCE and feeds many consumers ----
  sdk-ios:     { needs: tests, runs-on: ubuntu-latest, steps: [{ run: echo "SDK iOS -> AWS" }] }
  sdk-android: { needs: tests, runs-on: ubuntu-latest, steps: [{ run: echo "SDK Android -> AWS" }] }
  sdk-win:     { needs: tests, runs-on: ubuntu-latest, steps: [{ run: echo "SDK Windows -> AWS" }] }
  sdk-mac:     { needs: tests, runs-on: ubuntu-latest, steps: [{ run: echo "SDK macOS -> AWS" }] }

  # ---- Consumers fan out from the SAME sdk target ----
  flutter-ios:     { needs: sdk-ios,     runs-on: ubuntu-latest, steps: [{ run: echo "Flutter iOS" }] }
  flutter-android: { needs: sdk-android, runs-on: ubuntu-latest, steps: [{ run: echo "Flutter Android" }] }
  flutter-win:     { needs: sdk-win,     runs-on: ubuntu-latest, steps: [{ run: echo "Flutter Windows" }] }
  flutter-mac:     { needs: sdk-mac,     runs-on: ubuntu-latest, steps: [{ run: echo "Flutter macOS" }] }

  sample-ios:      { needs: sdk-ios,     runs-on: ubuntu-latest, steps: [{ run: echo "iOS Sample" }] }
  sample-android:  { needs: sdk-android, runs-on: ubuntu-latest, steps: [{ run: echo "Android Sample" }] }

  react-ios:       { needs: sdk-ios,     runs-on: ubuntu-latest, steps: [{ run: echo "React iOS" }] }
  react-android:   { needs: sdk-android, runs-on: ubuntu-latest, steps: [{ run: echo "React Android" }] }

  # ---- Plugins (fan-in) ----
  flutter-plugin:
    needs: [flutter-ios, flutter-android, flutter-win, flutter-mac]
    runs-on: ubuntu-latest
    steps: [{ run: echo "Flutter Plugin assembled" }]
  react-plugin:
    needs: [react-ios, react-android]
    runs-on: ubuntu-latest
    steps: [{ run: echo "React Plugin assembled" }]

  # ---- Publish (BUTTONS: approval before publishing) ----
  publish-flutter:
    needs: flutter-plugin
    runs-on: ubuntu-latest
    environment: publish-flutter
    steps: [{ run: echo "Publish Flutter Plugin" }]
  publish-react:
    needs: react-plugin
    runs-on: ubuntu-latest
    environment: publish-react
    steps: [{ run: echo "Publish React Plugin" }]
