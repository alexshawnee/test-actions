name: Pipeline Demo

on:
  push:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - run: echo "tests (auto)"

  # ---- SDK targets (auto, after tests) ----
  sdk-ios:
    needs: tests
    runs-on: ubuntu-latest
    steps: [{ run: echo "SDK iOS -> AWS" }]
  sdk-android:
    needs: tests
    runs-on: ubuntu-latest
    steps: [{ run: echo "SDK Android -> AWS" }]
  sdk-win:
    needs: tests
    runs-on: ubuntu-latest
    steps: [{ run: echo "SDK Windows -> AWS" }]
  sdk-mac:
    needs: tests
    runs-on: ubuntu-latest
    steps: [{ run: echo "SDK macOS -> AWS" }]

  # ---- Flutter targets (BUTTONS: each opens only when its SDK target is built) ----
  flutter-ios:
    needs: sdk-ios
    runs-on: ubuntu-latest
    environment: btn-flutter-ios
    steps: [{ run: echo "Flutter iOS (pull SDK iOS from AWS)" }]
  flutter-android:
    needs: sdk-android
    runs-on: ubuntu-latest
    environment: btn-flutter-android
    steps: [{ run: echo "Flutter Android" }]
  flutter-win:
    needs: sdk-win
    runs-on: ubuntu-latest
    environment: btn-flutter-win
    steps: [{ run: echo "Flutter Windows" }]
  flutter-mac:
    needs: sdk-mac
    runs-on: ubuntu-latest
    environment: btn-flutter-mac
    steps: [{ run: echo "Flutter macOS" }]

  # ---- Flutter Plugin (auto, only after ALL flutter targets) ----
  flutter-plugin:
    needs: [flutter-ios, flutter-android, flutter-win, flutter-mac]
    runs-on: ubuntu-latest
    steps: [{ run: echo "Flutter Plugin assembled from all targets" }]
